version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: wallet-mysql
    restart: always
    environment:
      MYSQL_DATABASE: walletdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: wallet-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      DB_USER: root
      DB_PASSWORD: root